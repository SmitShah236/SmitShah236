name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Toxic
          output: output/github-contribution-grid-snake.svg
          snake_color: "6B46C1, A78BFA"
      - uses: actions/upload-artifact@v4
        with:
          name: snake
          path: output
